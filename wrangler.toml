# Cloudflare Worker Configuration
# Md Takiuddin Ahmed — Senior Backend Engineer portfolio
# Hono Worker (src/index.ts) serving static files via Workers Static Assets (./public).

name = "takiuddin-portfolio"   # must match the Worker connected to Workers Builds
main = "src/index.ts"
compatibility_date = "2026-07-15"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true          # run Hono on every request so security headers apply to all responses
not_found_handling = "404-page"  # serve public/404.html with a 404 status for unmatched paths

# Custom domain: attach only AFTER removing takiuddin.me from the old Pages project,
# otherwise the deploy conflicts with the live domain. Then uncomment and redeploy:
# routes = [{ pattern = "takiuddin.me", custom_domain = true }]
